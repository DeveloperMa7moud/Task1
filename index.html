<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="x">الصفحة الرئيسة</a>
        <a href="x">تواصل معنا</a>
    </nav>
    <hr> 
    <header>

     <h1>مرحبا بكم في موقع Social</h1>
     <p> 
        اهلا بكم في موقعنا الخاص بالتواصل الاجتماعي الاكثر أمان
     </p>
    </header>
    <main>
     <section class="login">

        <form id="loginForm">
            <label for="username">اسم المستخدم:</label> <br>
            <input type="text" id="username" placeholder="اكتب اسمك هنا" required>
            <label for="mail">البريد الأكتروني:</label> <br>
            <input type="email" id="mail" placeholder="name@example" required>
            <label for="password">كلمة المرور:</label> <br>
            <input type="password" id="password" placeholder="كلمة المرور" required>
            <input type="submit" value="أدخال">

        </form>

     </section>

    </main>

    <script src="scrpit.js"></script>
</body>
</html>
